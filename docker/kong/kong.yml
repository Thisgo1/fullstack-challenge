_format_version: "3.0"

plugins:
  - name: cors
    config:
      origins:
        - "http://localhost:3000"
      methods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
      headers:
        - Accept
        - Authorization
        - Content-Type
        - X-Requested-With
      credentials: true
      max_age: 3600
      preflight_continue: false

services:
  - name: games-service
    url: http://games:4001
    routes:
      - name: games-routes
        paths:
          - /games
        strip_path: false

  - name: wallets-service
    url: http://wallets:4002
    routes:
      - name: wallets-routes
        paths:
          - /wallets
        strip_path: false        

  - name: games-websocket-service
    url: http://games:4001
    routes:
      - name: socket-io-route
        paths:
          - /socket.io
        protocols:
          - http
          - https
        strip_path: false
